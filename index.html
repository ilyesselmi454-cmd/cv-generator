<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CV Builder Pro</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="container">
  <h1>CV Builder</h1>

  <input id="name" placeholder="Nom">
  <input id="job" placeholder="Métier">
  <input id="email" placeholder="Email">
  <input id="phone" placeholder="Téléphone">

  <textarea id="desc" placeholder="Profil"></textarea>
  <input id="skills" placeholder="Compétences (HTML, CSS...)">
  <input id="exp" placeholder="Expérience">

  <input type="file" id="photo">

  <button onclick="generate()">Générer</button>
  <button onclick="downloadPDF()">Télécharger PDF</button>

  <!-- CV -->
  <div id="cv" class="cv">

    <div class="left">
      <img id="pimage">

      <h2 id="pname">Nom</h2>
      <p id="pjob"></p>

      <p id="pemail"></p>
      <p id="pphone"></p>
    </div>

    <div class="right">
      <h3>Profil</h3>
      <p id="pdesc"></p>

      <h3>Expérience</h3>
      <p id="pexp"></p>

      <h3>Compétences</h3>
      <div id="pskills"></div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
