<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CV Builder</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="container">
  <h1>✨ CV Builder</h1>

  <input id="name" placeholder="👤 Nom">
  <input id="job" placeholder="💼 Métier">
  <input id="email" placeholder="📧 Email">
  <input id="phone" placeholder="📱 Téléphone">

  <select id="template" onchange="changeTemplate()">
    <option value="card">Card moderne</option>
    <option value="split">Split layout</option>
    <option value="minimal">Minimal clean</option>
  </select>

  <textarea id="desc" placeholder="🧠 Profil"></textarea>
  <small id="descHelp"></small>

  <input id="skills" placeholder="⭐ Compétences">
  <small id="skillsHelp"></small>

  <input id="exp" placeholder="📂 Expérience">
  <input type="file" id="photo">

  <button onclick="generate()">✨ Générer</button>
  <button onclick="downloadPDF()">📄 PDF</button>

  <!-- CV -->
  <div id="cv" class="cv card">

    <div class="card-layout">
      <img id="pimage" src="https://via.placeholder.com/100">

      <h2 id="pname"></h2>
      <p id="pjob"></p>

      <div class="info">
        <p>📧 <span id="pemail"></span></p>
        <p>📱 <span id="pphone"></span></p>
      </div>

      <div class="section">
        <h3>🧠 Profil</h3>
        <p id="pdesc"></p>
      </div>

      <div class="section">
        <h3>⭐ Compétences</h3>
        <div id="pskills"></div>
      </div>

      <div class="section">
        <h3>📂 Expérience</h3>
        <p id="pexp"></p>
      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
