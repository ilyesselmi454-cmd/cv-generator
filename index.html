<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CV Builder UI</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="container">
  <h1>✨ CV Builder</h1>

  <!-- THEME -->
  <select id="theme" onchange="changeTheme()">
    <option value="blue">Bleu</option>
    <option value="purple">Violet</option>
    <option value="green">Vert</option>
    <option value="dark">Noir</option>
  </select>

  <div class="input-group">
    <input id="name" placeholder=" ">
    <label>Nom</label>
  </div>

  <div class="input-group">
    <input id="job" placeholder=" ">
    <label>Métier</label>
  </div>

  <div class="input-group">
    <input id="email" placeholder=" ">
    <label>Email</label>
  </div>

  <div class="input-group">
    <input id="phone" placeholder=" ">
    <label>Téléphone</label>
  </div>

  <div class="input-group">
    <textarea id="desc" placeholder=" "></textarea>
    <label>Profil</label>
  </div>

  <div class="input-group">
    <textarea id="skills" placeholder=" "></textarea>
    <label>Compétences</label>
  </div>

  <div class="input-group">
    <textarea id="exp" placeholder=" "></textarea>
    <label>Expérience</label>
  </div>

  <input type="file" id="photo">

  <button onclick="generate()">Générer</button>
  <button onclick="downloadPDF()">Télécharger PDF</button>

  <!-- CV -->
  <div id="cv" class="cv blue">

    <div class="left">
      <img id="pimage">

      <h2 id="pname">Nom</h2>
      <p id="pjob"></p>

      <p>📧 <span id="pemail"></span></p>
      <p>📱 <span id="pphone"></span></p>
    </div>

    <div class="right">
      <h3>Profil</h3>
      <p id="pdesc"></p>

      <h3>Expérience</h3>
      <p id="pexp"></p>

      <h3>Compétences</h3>
      <div id="pskills"></div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
