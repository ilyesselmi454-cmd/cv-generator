<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CV PRO MAX</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="container">
  <h1>CV PRO MAX</h1>

  <input id="name" placeholder="Nom">
  <input id="job" placeholder="Métier">
  <input id="email" placeholder="Email">
  <input id="phone" placeholder="Téléphone">

  <textarea id="desc" placeholder="Profil"></textarea>
  <input id="skills" placeholder="Compétences">
  <input id="exp" placeholder="Expérience">
  <input type="file" id="photo">

  <button onclick="generate()">Générer</button>
  <button onclick="downloadPDF()">PDF</button>

  <!-- CV -->
  <div id="cv" class="cv">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <img id="pimage" src="https://via.placeholder.com/100">

      <h2 id="pname"></h2>
      <p id="pjob"></p>

      <hr>

      <p>📧 <span id="pemail"></span></p>
      <p>📱 <span id="pphone"></span></p>

      <hr>

      <h3>Compétences</h3>
      <div id="pskills"></div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <h3>Profil</h3>
      <p id="pdesc"></p>

      <h3>Expérience</h3>
      <p id="pexp"></p>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
