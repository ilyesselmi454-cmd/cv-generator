<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="google-site-verification" content="Wvvy2jUMRNKZvY_Hxii3m_8dt7aajiTExa6WhplJ3vs" />
<title>CV Generator by Ilyes</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="container">
  <h1>CV Generator PRO</h1>

  <input type="text" id="name" placeholder="Nom">
  <input type="text" id="job" placeholder="Métier">
  <textarea id="desc" placeholder="Profil"></textarea>
  <input type="text" id="skills" placeholder="Compétences (ex: HTML, CSS, JS)">
  <input type="text" id="exp" placeholder="Expérience">
  <input type="file" id="photo" accept="image/*">

  <button onclick="generate()">Générer</button>
  <button onclick="downloadPDF()">Télécharger PDF</button>

  <!-- CV -->
  <div class="cv" id="cv">
    
    <!-- LEFT -->
    <div class="left">
      <img id="pimage">

      <h2 id="pname">Nom</h2>
      <p id="pjob">Métier</p>

      <h3>Compétences</h3>
      <div id="pskills"></div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <h3>Profil</h3>
      <p id="pdesc"></p>

      <h3>Expérience</h3>
      <p id="pexp"></p>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
