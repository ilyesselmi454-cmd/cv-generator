<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CV Generator Pro</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="container">
  <h1>CV Generator Pro</h1>

  <input type="text" id="name" placeholder="Nom">
  <input type="text" id="job" placeholder="Métier">
  <input type="text" id="email" placeholder="Email">
  <input type="text" id="phone" placeholder="Téléphone">

  <textarea id="desc" placeholder="Profil"></textarea>
  <small id="descHelp"></small>

  <input type="text" id="skills" placeholder="Compétences (séparées par ,)">
  <small id="skillsHelp"></small>

  <input type="text" id="exp" placeholder="Expérience">
  <small id="expHelp"></small>

  <input type="file" id="photo">

  <!-- TEMPLATE -->
  <select id="template" onchange="changeTemplate()">
    <option value="modern">Moderne</option>
    <option value="dark">Dark</option>
    <option value="minimal">Minimal</option>
    <option value="green">Green</option>
    <option value="purple">Purple</option>
  </select>

  <button onclick="autoFill()">🤖 Auto CV</button>
  <button onclick="generate()">Générer</button>
  <button onclick="downloadPDF()">Télécharger PDF</button>

  <!-- CV -->
  <div id="cv" class="cv modern">

    <div class="header">
      <img id="pimage" src="https://via.placeholder.com/100">
      <div>
        <h1 id="pname"></h1>
        <p id="pjob"></p>
        <p id="pcontact"></p>
      </div>
    </div>

    <div class="content">
      <div class="left">
        <h3>Profil</h3>
        <p id="pdesc"></p>

        <h3>Expérience</h3>
        <p id="pexp"></p>
      </div>

      <div class="right">
        <h3>Compétences</h3>
        <div id="pskills"></div>
      </div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
