<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CV Generator by Ilyes</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="container">
  <h1>CV Generator by Ilyes</h1>

  <input type="text" id="name" placeholder="Nom">
  <input type="text" id="job" placeholder="Métier">
  <textarea id="desc" placeholder="Profil"></textarea>
  <small id="descHelp" class="help"></small>

  <input type="text" id="skills" placeholder="Compétences">
  <small id="skillsHelp" class="help"></small>

  <input type="text" id="exp" placeholder="Expérience">
  <small id="expHelp" class="help"></small>

  <input type="file" id="photo">

  <button onclick="generate()">Générer</button>
  <button onclick="downloadPDF()">Télécharger PDF</button>

  <!-- CV -->
  <div id="cv">
    <div class="cv-page">

      <!-- HEADER -->
      <div class="header">
        <img id="pimage" src="https://via.placeholder.com/100">
        <div>
          <h1 id="pname">Nom</h1>
          <p id="pjob">Métier</p>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="content">

        <div class="left">
          <h3>Profil</h3>
          <p id="pdesc"></p>

          <h3>Expérience</h3>
          <p id="pexp"></p>
        </div>

        <div class="right">
          <h3>Compétences</h3>
          <div id="pskills"></div>
        </div>

      </div>

    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
